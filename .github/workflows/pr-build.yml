name: PR Build
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pnpm install
      - name: CDK Synth
        run: npx nx run @aws-samples/smart-product-onboarding-infra:synth

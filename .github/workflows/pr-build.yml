name: PR Build
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYENV_ROOT: ${{ github.workspace }}/.pyenv
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install pyenv
        run: |
          curl -fsSL https://pyenv.run | bash
          echo "$PYENV_ROOT/bin" >> $GITHUB_PATH
          echo "$PYENV_ROOT/shims" >> $GITHUB_PATH
      - name: Setup Python 3.13
        run: |
          eval "$(pyenv init -)"
          pyenv install 3.13
          pyenv global 3.13
          pyenv rehash
      - name: Install Poetry
        run: pip install "poetry<2"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: pnpm install:ci
      - name: CDK Synth
        run: npx nx run @aws-samples/smart-product-onboarding-infra:synth


[project]
name = "amzn-smart-product-onboarding-metaclasses"
version = "0.1.0"
description = "Metaclasses generation and processing for Smart Product Onboarding"
requires-python = ">=3.12,<4"
readme = "README.md"
dependencies = [
    "cachetools>=5.5.1",
    "faiss-cpu>=1.10.0",
    "inflect>=7.4.0",
    "jinja2>=3.1.4",
    "nltk>=3.9.3",
    "numpy>=2.2.2",
    "amzn-smart-product-onboarding-api-runtime",
    "amzn-smart-product-onboarding-core-utils",
]

[tool.hatch.build.targets.wheel]
packages = ["amzn_smart_product_onboarding_metaclasses"]

[tool.hatch.metadata]
allow-direct-references = true

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "boto3-stubs-lite[bedrock-runtime,s3,dynamodb]>=1.35.37",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
exclude = [
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "dist",
]

line-length = 120
indent-width = 4

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []

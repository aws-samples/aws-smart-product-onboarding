# API Runtime Package - Generated from OpenAPI specification
# This package will be generated directly to this location

[project]
name = "amzn-smart-product-onboarding-api-runtime"
version = "0.1.0"
description = "Generated API runtime for Smart Product Onboarding"
requires-python = ">=3.12,<4"
readme = "README.md"
dependencies = [
    "aenum>=3.1.11",
    "pydantic>=2.5.2", 
    "python-dateutil~=2.8.2",
    "urllib3>=2.6.3",
    "aws-lambda-powertools[tracer,aws-sdk]>=2.28.0",
]

[tool.hatch.build.targets.wheel]
packages = ["amzn_smart_product_onboarding_api_runtime"]

[tool.hatch.metadata]
allow-direct-references = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
exclude = [
    ".ruff_cache",
    ".svn",
    ".tox", 
    ".venv",
    "dist",
    # This is generated code, exclude from linting
    "**/*.py",
]

line-length = 120
indent-width = 4

[project]
name = "amzn-smart-product-onboarding-product-categorization"
version = "0.1.0"
description = "Product categorization logic for Smart Product Onboarding"
requires-python = ">=3.12,<4"
readme = "README.md"
dependencies = [
    "cachetools>=5.5.1",
    "faker>=30.1.0",
    "jinja2>=3.1.4",
    "amzn-smart-product-onboarding-api-runtime",
    "amzn-smart-product-onboarding-core-utils",
]

[tool.hatch.build.targets.wheel]
packages = ["amzn_smart_product_onboarding_product_categorization"]

[tool.hatch.metadata]
allow-direct-references = true

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "boto3-stubs-lite[bedrock-runtime,s3]>=1.35.37",
    "moto[all]>=5.0.16",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
exclude = [
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "dist",
]

line-length = 120
indent-width = 4

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []
